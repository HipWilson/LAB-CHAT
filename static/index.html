<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="header">
        <span id="titulo">💬 ChatApp</span>
        <div id="nick-area">
            <label for="username">Tu nombre:</label>
            <input id="username" type="text" placeholder="Anónimo" maxlength="20">
        </div>
    </div>

    <div id="chat-box"></div>

    <div id="input-container">
        <textarea id="user-input" placeholder="Escribe un mensaje..."></textarea>
        <button id="send-button">Enviar</button>
        <div id="char-count">0 / 140</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
